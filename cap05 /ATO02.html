<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PWEB1 — Cap. 05 — AT02 — Cadastro de Usuário</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f4f8;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    form {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    label {
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    fieldset {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 15px;
    }

    legend {
      font-weight: bold;
    }

    input[type="radio"],
    input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
    }

    button[type="submit"] {
      background-color: #4CAF50;
      color: white;
    }

    button[type="reset"] {
      background-color: #f44336;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<header>
    <h1>Cadastro de Usuário</h1>
    <p><a href="index.html">← Voltar para a página principal</a></p>
  </header>

  	<main>

  <form action="https://httpbin.org/post" method="POST">

    <h1>Cadastro de Usuário</h1>

    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome" required minlength="3">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required minlength="8">

    <label for="nascimento">Data de nascimento:</label>
    <input type="date" id="nascimento" name="nascimento" required>

    <fieldset>
      <legend>Gênero</legend>

      <label><input type="radio" name="genero" value="masculino"> Masculino</label><br>
      <label><input type="radio" name="genero" value="feminino"> Feminino</label><br>
      <label><input type="radio" name="genero" value="outro"> Outro</label><br>
      <label><input type="radio" name="genero" value="prefiro_nao_informar"> Prefiro não informar</label>

    </fieldset>

    <label>
      <input type="checkbox" name="aceite" value="sim" required>
      Aceito os termos de uso
    </label>

    <br><br>

    <button type="submit">Criar conta</button>
    <button type="reset">Limpar campos</button>

  </form>
	</main>

</body>
</html>
