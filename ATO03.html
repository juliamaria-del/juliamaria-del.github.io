<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    form {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .nota {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    fieldset {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    legend {
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    input[type="radio"],
    input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
    }

    .grupo-opcoes label {
      font-weight: normal;
      display: inline-block;
      margin-right: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    button[type="submit"] {
      background-color: #4CAF50;
      color: white;
    }

    button[type="reset"] {
      background-color: #f44336;
      color: white;
    }

  </style>
</head>

<body>

 <header>
    <h1>Matrícula Acadêmica</h1>
    <p><a href="index.html">← Voltar para a página principal</a></p>
  </header>

 	<main>

  <form action="https://httpbin.org/post" method="POST">

    <h1>Matrícula Acadêmica</h1>
    <div class="nota">* Campos obrigatórios</div>

    <!-- SEÇÃO 1 -->
    <fieldset>
      <legend>Dados Pessoais</legend>

      <label for="nome">Nome completo *</label>
      <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">

      <label for="cpf">CPF *</label>
      <input type="text"
             id="cpf"
             name="cpf"
             required
             placeholder="000.000.000-00"
             pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
             title="CPF no formato 000.000.000-00">

      <label for="telefone">Telefone</label>
      <input type="tel"
             id="telefone"
             name="telefone"
             placeholder="(82) 99999-9999"
             pattern="\(\d{2}\)\s\d{4,5}-\d{4}">

      <label for="email">E-mail *</label>
      <input type="email" id="email" name="email" required>

    </fieldset>

    <!-- SEÇÃO 2 -->
    <fieldset>
      <legend>Dados Acadêmicos</legend>

      <label for="curso">Curso *</label>
      <select id="curso" name="curso" required>
        <option value="">Selecione um curso</option>

        <optgroup label="Computação">
          <option>Sistemas de Informação</option>
          <option>Ciência da Computação</option>
          <option>Engenharia da Computação</option>
        </optgroup>

        <optgroup label="Gestão">
          <option>Administração</option>
          <option>Ciências Contábeis</option>
        </optgroup>
      </select>

      <label>Período *</label>
      <fieldset class="grupo-opcoes">
        <label><input type="radio" name="periodo" value="manha"> Manhã</label>
        <label><input type="radio" name="periodo" value="tarde"> Tarde</label>
        <label><input type="radio" name="periodo" value="noite"> Noite</label>
      </fieldset>

      <label for="ano">Ano de ingresso *</label>
      <input type="number"
             id="ano"
             name="ano_ingresso"
             min="2025"
             max="2030"
             required>

    </fieldset>

    <!-- SEÇÃO 3 -->
    <fieldset>
      <legend>Áreas de Interesse</legend>

      <label><input type="checkbox" name="interesses[]" value="web"> Desenvolvimento Web</label>
      <label><input type="checkbox" name="interesses[]" value="bd"> Banco de Dados</label>
      <label><input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial</label>
      <label><input type="checkbox" name="interesses[]" value="seguranca"> Segurança da Informação</label>
      <label><input type="checkbox" name="interesses[]" value="infra"> Infraestrutura</label>

    </fieldset>

    <!-- BOTÕES -->
    <button type="submit">Solicitar matrícula</button>
    <button type="reset">Limpar formulário</button>

  </form>
	</main>

</body>
</html>
